<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI ও BMR ক্যালকুলেটর</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts (Hind Siliguri for Bengali) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
        }
        /* Remove default arrows from number inputs */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-100 via-purple-100 to-pink-100 min-h-screen flex items-center justify-center p-4 text-gray-800">

    <!-- Main Card Container -->
    <div class="bg-white rounded-[2rem] shadow-2xl flex flex-col md:flex-row w-full max-w-5xl overflow-hidden border-4 border-white">
        
        <!-- Left Side: Input Form -->
        <div class="w-full md:w-1/2 p-8 md:p-10 flex flex-col justify-center">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 mb-2">স্বাস্থ্য ক্যালকুলেটর</h1>
            <p class="text-gray-500 mb-8 font-medium">আপনার বডি মাস ইনডেক্স (BMI) এবং বেসাল মেটাবলিক রেট (BMR) জেনে নিন।</p>
            
            <form id="health-form" class="space-y-6">
                <!-- Gender Selection -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-3">লিঙ্গ নির্বাচন করুন</label>
                    <div class="flex gap-4">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="gender" id="male" value="male" class="peer hidden" checked>
                            <div class="flex flex-col items-center justify-center p-4 border-2 border-gray-100 rounded-2xl peer-checked:border-blue-500 peer-checked:bg-blue-50 text-gray-500 peer-checked:text-blue-600 transition-all shadow-sm">
                                <span class="text-3xl mb-1 drop-shadow-md">👨</span>
                                <span class="font-bold">ছেলে</span>
                            </div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="gender" id="female" value="female" class="peer hidden">
                            <div class="flex flex-col items-center justify-center p-4 border-2 border-gray-100 rounded-2xl peer-checked:border-pink-500 peer-checked:bg-pink-50 text-gray-500 peer-checked:text-pink-600 transition-all shadow-sm">
                                <span class="text-3xl mb-1 drop-shadow-md">👩</span>
                                <span class="font-bold">মেয়ে</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Input Fields (Age, Weight, Feet, Inches) -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Age -->
                    <div>
                        <label for="age" class="block text-sm font-semibold text-gray-700 mb-1">বয়স</label>
                        <div class="relative">
                            <input type="number" id="age" required min="1" max="120" placeholder="যেমন: ২৫" class="w-full pl-4 pr-12 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition-all font-medium text-lg">
                            <span class="absolute right-4 top-3.5 text-gray-400 font-medium">বছর</span>
                        </div>
                    </div>
                    
                    <!-- Weight -->
                    <div>
                        <label for="weight" class="block text-sm font-semibold text-gray-700 mb-1">ওজন</label>
                        <div class="relative">
                            <input type="number" id="weight" required min="1" step="0.1" placeholder="যেমন: ৬৫" class="w-full pl-4 pr-12 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition-all font-medium text-lg">
                            <span class="absolute right-4 top-3.5 text-gray-400 font-medium">কেজি</span>
                        </div>
                    </div>
                    
                    <!-- Height (Feet) -->
                    <div>
                        <label for="feet" class="block text-sm font-semibold text-gray-700 mb-1">উচ্চতা (ফুট)</label>
                        <div class="relative">
                            <input type="number" id="feet" required min="1" max="8" placeholder="যেমন: ৫" class="w-full pl-4 pr-12 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition-all font-medium text-lg">
                            <span class="absolute right-4 top-3.5 text-gray-400 font-medium">ফুট</span>
                        </div>
                    </div>

                    <!-- Height (Inches) -->
                    <div>
                        <label for="inches" class="block text-sm font-semibold text-gray-700 mb-1">উচ্চতা (ইঞ্চি)</label>
                        <div class="relative">
                            <input type="number" id="inches" required min="0" max="11" step="0.1" placeholder="যেমন: ৬" class="w-full pl-4 pr-14 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition-all font-medium text-lg">
                            <span class="absolute right-4 top-3.5 text-gray-400 font-medium">ইঞ্চি</span>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full py-4 bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-bold text-lg rounded-xl shadow-lg hover:shadow-xl transform transition-all active:scale-95 mt-2">
                    হিসেব করুন
                </button>
            </form>
        </div>

        <!-- Right Side: Avatar & Results -->
        <div class="w-full md:w-1/2 bg-gradient-to-b from-indigo-50 to-blue-100 p-8 md:p-10 flex flex-col items-center justify-center relative border-l border-gray-100">
            
            <!-- Character Stage -->
            <div class="relative h-64 flex items-end justify-center mb-8">
                <!-- Avatar Scale Wrapper for BMI Animation -->
                <div id="avatar-scale" class="transition-transform duration-700 ease-in-out origin-bottom h-full flex flex-col items-center">
                    
                    <!-- Boy SVG -->
                    <svg viewBox="0 0 100 200" class="h-full drop-shadow-xl" id="boy-svg">
                        <rect x="35" y="120" width="10" height="70" rx="4" fill="#1E3A8A" />
                        <rect x="55" y="120" width="10" height="70" rx="4" fill="#1E3A8A" />
                        <rect x="25" y="60" width="50" height="65" rx="15" fill="#3B82F6" />
                        <rect x="10" y="65" width="10" height="50" rx="4" fill="#FDBA74" />
                        <rect x="80" y="65" width="10" height="50" rx="4" fill="#FDBA74" />
                        <circle cx="50" cy="35" r="20" fill="#FDBA74" />
                        <path d="M 30 30 Q 50 5 70 30 Q 50 15 30 30" fill="#1F2937" />
                        <circle cx="42" cy="32" r="2.5" fill="#111827" />
                        <circle cx="58" cy="32" r="2.5" fill="#111827" />
                        <path d="M 44 42 Q 50 48 56 42" stroke="#111827" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    </svg>

                    <!-- Girl SVG -->
                    <svg viewBox="0 0 100 200" class="h-full drop-shadow-xl hidden" id="girl-svg">
                        <rect x="35" y="120" width="9" height="70" rx="4" fill="#BE185D" />
                        <rect x="56" y="120" width="9" height="70" rx="4" fill="#BE185D" />
                        <path d="M 35 60 L 20 135 A 4 4 0 0 0 24 140 L 76 140 A 4 4 0 0 0 80 135 L 65 60 Z" fill="#EC4899" />
                        <rect x="13" y="65" width="9" height="50" rx="4" fill="#FDBA74" />
                        <rect x="78" y="65" width="9" height="50" rx="4" fill="#FDBA74" />
                        <rect x="25" y="20" width="50" height="65" rx="15" fill="#451A03" />
                        <circle cx="50" cy="35" r="20" fill="#FDBA74" />
                        <path d="M 28 35 Q 50 10 72 35 Q 50 20 28 35" fill="#451A03" />
                        <circle cx="42" cy="32" r="2.5" fill="#111827" />
                        <circle cx="58" cy="32" r="2.5" fill="#111827" />
                        <path d="M 44 42 Q 50 48 56 42" stroke="#111827" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    </svg>
                    
                </div>
                <!-- Floor Shadow -->
                <div class="absolute bottom-0 w-32 h-3 bg-black/10 rounded-[100%] blur-[2px] -z-10"></div>
            </div>

            <!-- Result Box -->
            <div id="result-box" class="w-full bg-white rounded-2xl p-6 shadow-lg opacity-0 translate-y-4 transition-all duration-500 ease-out hidden">
                <h3 class="text-xl font-bold text-gray-800 border-b pb-3 mb-3 text-center">আপনার ফলাফল</h3>
                
                <div class="flex justify-between items-center mb-2">
                    <span class="text-gray-500 font-semibold text-lg">আপনার BMI:</span>
                    <span id="bmi-result" class="text-2xl font-black text-blue-600">--</span>
                </div>
                
                <div class="flex justify-between items-center mb-4">
                    <span class="text-gray-500 font-semibold text-lg">আপনার BMR:</span>
                    <span id="bmr-result" class="text-xl font-bold text-purple-600">--</span>
                </div>
                
                <!-- Health Status (Text color changes dynamically) -->
                <div class="mt-4 pt-4 border-t border-gray-100 text-center">
                    <p id="health-status" class="text-lg font-bold">---</p>
                </div>

                <!-- Suggestions / Advice Section -->
                <div id="advice-section" class="mt-4 pt-4 border-t border-gray-100 text-left bg-gray-50 p-4 rounded-xl hidden">
                    <h4 class="text-md font-bold text-gray-800 mb-2 flex items-center gap-2">
                        <span>💡</span> আপনার জন্য পরামর্শ:
                    </h4>
                    <ul id="advice-list" class="list-none text-sm text-gray-600 space-y-2 leading-relaxed">
                        <!-- Dynamic advice injected here -->
                    </ul>
                </div>
            </div>

            <!-- Default Placeholder Text -->
            <p id="waiting-text" class="absolute bottom-10 text-gray-400 font-medium animate-pulse text-center">ফলাফল দেখতে ফর্মটি পূরণ করুন</p>
            
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('health-form');
            const maleRadio = document.getElementById('male');
            const femaleRadio = document.getElementById('female');
            
            const boySvg = document.getElementById('boy-svg');
            const girlSvg = document.getElementById('girl-svg');
            const avatarScale = document.getElementById('avatar-scale');
            
            const resultBox = document.getElementById('result-box');
            const waitingText = document.getElementById('waiting-text');
            
            const bmiResultText = document.getElementById('bmi-result');
            const bmrResultText = document.getElementById('bmr-result');
            const healthStatusText = document.getElementById('health-status');
            
            const adviceSection = document.getElementById('advice-section');
            const adviceList = document.getElementById('advice-list');

            // Toggle character based on gender selection
            const updateCharacter = () => {
                if (maleRadio.checked) {
                    boySvg.classList.remove('hidden');
                    girlSvg.classList.add('hidden');
                } else {
                    boySvg.classList.add('hidden');
                    girlSvg.classList.remove('hidden');
                }
            };

            maleRadio.addEventListener('change', updateCharacter);
            femaleRadio.addEventListener('change', updateCharacter);

            // Handle Form Submission
            form.addEventListener('submit', (e) => {
                e.preventDefault();

                // Get input values
                const age = parseFloat(document.getElementById('age').value);
                const weight = parseFloat(document.getElementById('weight').value);
                const feet = parseFloat(document.getElementById('feet').value);
                let inches = parseFloat(document.getElementById('inches').value);
                
                const gender = maleRadio.checked ? 'male' : 'female';

                // Input validation
                if (!age || !weight || !feet) return;
                if (isNaN(inches)) inches = 0; // যদি কেউ ইঞ্চি ফাঁকা রাখে, তবে ০ ধরে নেবে

                // Convert Feet & Inches to Centimeters
                // ১ ফুট = ৩০.৪৮ সে.মি. এবং ১ ইঞ্চি = ২.৫৪ সে.মি.
                const heightInCm = (feet * 30.48) + (inches * 2.54);
                
                // BMI Calculation: weight (kg) / [height (m)]^2
                const heightInMeters = heightInCm / 100;
                const bmi = weight / (heightInMeters * heightInMeters);

                // BMR Calculation (Mifflin-St Jeor Equation)
                let bmr = 0;
                if (gender === 'male') {
                    bmr = (10 * weight) + (6.25 * heightInCm) - (5 * age) + 5;
                } else {
                    bmr = (10 * weight) + (6.25 * heightInCm) - (5 * age) - 161;
                }

                // Update texts
                bmiResultText.innerText = bmi.toFixed(2);
                bmrResultText.innerText = Math.round(bmr) + ' ক্যালরি/দিন';

                // Determine Health Status, Character Scale and Advice
                let scaleX = 1;
                let adviceHtml = "";
                
                // Reset Classes
                healthStatusText.className = "text-lg md:text-xl font-bold transition-colors duration-300";

                if (bmi < 18.5) {
                    healthStatusText.innerText = "আপনার ওজন স্বাভাবিকের চেয়ে কম, স্বাস্থ্য ঝুঁকি রয়েছে";
                    healthStatusText.classList.add("text-yellow-600");
                    scaleX = 0.65; // Thin
                    adviceHtml = `
                        <li><span class="text-yellow-600 font-bold">⚠️</span> <b>ওজন বাড়াতে হবে:</b> পুষ্টিকর ও ক্যালরিযুক্ত খাবার গ্রহণ করুন।</li>
                        <li><span class="text-green-600 font-bold">✔️</span> <b>বেশি খাবেন:</b> ডিম, দুধ, কলা, কাঠবাদাম, চিনা বাদাম, মাছ-মাংস, ডাল, আলু এবং দেশি ঘি।</li>
                        <li><span class="text-blue-500 font-bold">🏃</span> <b>জীবনযাপন:</b> পেশি গঠনের জন্য হালকা ব্যায়াম করুন, প্রতিদিন ৭-৮ ঘণ্টা ঘুমান এবং সময়মতো খাবার খাওয়ার অভ্যাস করুন।</li>
                    `;
                } 
                else if (bmi >= 18.5 && bmi <= 24.9) {
                    healthStatusText.innerText = "আপনি সুস্থ আছেন";
                    healthStatusText.classList.add("text-green-600");
                    scaleX = 1.0; // Normal
                    adviceHtml = `
                        <li><span class="text-green-600 font-bold">🎉</span> <b>অভিনন্দন!</b> আপনার ওজন একদম সঠিক আছে। এই চমৎকার স্বাস্থ্য ধরে রাখতে বর্তমান রুটিন মেনে চলুন।</li>
                        <li><span class="text-blue-500 font-bold">💧</span> <b>পরামর্শ:</b> প্রতিদিন স্বাস্থ্যকর ও সুষম খাবার খান এবং পর্যাপ্ত পরিমাণ পানি পান করুন।</li>
                        <li><span class="text-purple-500 font-bold">🏃</span> <b>ব্যায়াম:</b> শরীর সবসময় ফিট রাখতে প্রতিদিন অন্তত ২০-৩০ মিনিট হাঁটা বা হালকা শারীরিক পরিশ্রম চালিয়ে যান।</li>
                    `;
                } 
                else if (bmi >= 25 && bmi <= 29.9) {
                    healthStatusText.innerText = "আপনার ওজন বেশি, স্বাস্থ্য ঝুঁকি রয়েছে";
                    healthStatusText.classList.add("text-red-500");
                    scaleX = 1.35; // Overweight
                    adviceHtml = `
                        <li><span class="text-red-500 font-bold">⚠️</span> <b>জীবনযাপনে পরিবর্তন:</b> আপনার ওজন কমাতে হবে, তাই খাদ্যাভ্যাসে কিছুটা নিয়ন্ত্রণ আনা জরুরি।</li>
                        <li><span class="text-red-600 font-bold">❌</span> <b>কম খাবেন:</b> চিনি বা মিষ্টিজাতীয় খাবার, ফাস্ট ফুড, কোমল পানীয় (Soft drinks), এবং অতিরিক্ত ভাত বা রুটি।</li>
                        <li><span class="text-green-600 font-bold">✔️</span> <b>বেশি খাবেন:</b> শাকসবজি, দেশি ফলমূল এবং আঁশযুক্ত (ফাইবার) খাবার।</li>
                        <li><span class="text-blue-500 font-bold">🏃</span> <b>ব্যায়াম:</b> প্রতিদিন কমপক্ষে ৩০-৪০ মিনিট ঘাম ঝরিয়ে হাঁটার বা ব্যায়াম করার চেষ্টা করুন।</li>
                    `;
                } 
                else {
                    healthStatusText.innerText = "আপনার ওজন অনেক বেশি, স্বাস্থ্য ঝুঁকি রয়েছে";
                    healthStatusText.classList.add("text-red-600");
                    scaleX = 1.65; // Obese
                    adviceHtml = `
                        <li><span class="text-red-600 font-bold">⚠️</span> <b>সতর্কতা:</b> আপনার অতিরিক্ত ওজন রয়েছে যা দীর্ঘমেয়াদী স্বাস্থ্য ঝুঁকির কারণ। দ্রুত ওজন কমানোর পদক্ষেপ নিন।</li>
                        <li><span class="text-red-600 font-bold">❌</span> <b>সম্পূর্ণ বাদ দিন:</b> মিষ্টি, ফাস্ট ফুড, প্রসেসড ফুড, তেলে ভাজা খাবার এবং কোমল পানীয়।</li>
                        <li><span class="text-green-600 font-bold">✔️</span> <b>খাবারের রুটিন:</b> ভাত বা রুটির পরিমাণ একদম কমিয়ে দিন। তার বদলে প্রচুর শাকসবজি, প্রোটিন (ডিম, মাছ) এবং সালাদ খান।</li>
                        <li><span class="text-blue-500 font-bold">🏃</span> <b>ব্যায়াম ও পরামর্শ:</b> প্রতিদিন অন্তত ৪৫-৬০ মিনিট ব্যায়াম বা হাঁটা বাধ্যতামূলক। প্রয়োজনে একজন পুষ্টিবিদের (Dietitian) সাহায্য নিন।</li>
                    `;
                }

                // Apply dynamic stretching to character to visually represent body type
                avatarScale.style.transform = `scaleX(${scaleX})`;

                // Populate Advice List and Show
                adviceList.innerHTML = adviceHtml;
                adviceSection.classList.remove('hidden');

                // Show Results Box with Animation
                waitingText.classList.add('hidden');
                resultBox.classList.remove('hidden');
                // Small delay to allow display:block to apply before animating opacity
                setTimeout(() => {
                    resultBox.classList.remove('opacity-0', 'translate-y-4');
                    resultBox.classList.add('opacity-100', 'translate-y-0');
                }, 50);
            });
        });
    </script>
</body>
</html>
